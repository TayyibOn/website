<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TayyibOn</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <img src="logo.svg" alt="TayyibOn Logo" class="logo">

        <h1>TayyibOn</h1>

        <p class="tagline">
            Learn what is in your food
        </p>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden
        >

        <button id="uploadBtn">
            Upload Image
        </button>

        <div id="previewContainer">
            <img id="previewImage" alt="">
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
